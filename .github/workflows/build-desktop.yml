name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: msi

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VITE_TAURI: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build Tauri
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUSTFLAGS: ${{ startsWith(matrix.os, 'macos') && '-A unexpected_cfgs' || '' }}
        run: |
          if [[ "${{ matrix.os }}" == macos-* ]]; then
            brew install create-dmg 2>/dev/null || true
          fi
          pnpm tauri build --target ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release
          B="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [[ "${{ matrix.os }}" == macos-* ]]; then
            cp "$B/dmg/"*.dmg release/ 2>/dev/null || true
            cp "$B/dmg/"*.dmg.sig release/ 2>/dev/null || true
            # 手动打包 .app 为 updater 所需的 .app.tar.gz
            APP_DIR=$(ls -d "$B/macos/"*.app 2>/dev/null | head -1)
            if [ -n "$APP_DIR" ]; then
              APP_NAME=$(basename "$APP_DIR" .app)
              VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*: "\(.*\)".*/\1/')
              TAR_NAME="${APP_NAME}_${VERSION}_aarch64.app.tar.gz"
              cd "$B/macos"
              tar -czf "../$TAR_NAME" "$(basename "$APP_DIR")"
              cd -
              cp "$B/$TAR_NAME" release/
              if [ -f "$B/dmg/"*.dmg.sig ]; then
                cp "$B/dmg/"*.dmg.sig "release/${TAR_NAME}.sig" 2>/dev/null || true
              fi
            fi
          else
            cp "$B/msi/"*.msi release/ 2>/dev/null || true
            cp "$B/nsis/"*.exe release/ 2>/dev/null || true
            cp "$B/msi/"*.msi.sig release/ 2>/dev/null || true
            cp "$B/nsis/"*.exe.sig release/ 2>/dev/null || true
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: R-Markdown-${{ matrix.os }}
          path: release/

  collect:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mkdir -p release
          cp -r R-Markdown-*/* release/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: R-Markdown-All
          path: release/

  release:
    needs: collect
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: R-Markdown-All
          path: release

      - name: Generate latest.json
        run: |
          V="${GITHUB_REF#refs/tags/v}"
          echo -n "{\"version\":\"$V\",\"pub_date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"platforms\":{" > release/latest.json
          first=true
          for f in release/*; do
            name=$(basename "$f")
            [[ "$name" == *.sig ]] && continue

            # Map filename to Tauri platform key; only include updater bundles
            platform=""
            if [[ "$name" == *.tar.gz ]]; then
              # macOS updater bundle
              if [[ "$name" == *aarch64* ]]; then
                platform="darwin-aarch64"
              elif [[ "$name" == *x64* ]] || [[ "$name" == *x86_64* ]]; then
                platform="darwin-x86_64"
              fi
            elif [[ "$name" == *setup.exe ]] || [[ "$name" == *.exe ]] && [[ "$name" != *.dmg* ]]; then
              # Windows NSIS updater bundle (exclude dmg which might have .exe elsewhere)
              if [[ "$name" == *x64* ]]; then
                platform="windows-x86_64"
              else
                platform="windows-x86"
              fi
            else
              continue
            fi
            [[ -z "$platform" ]] && continue

            sig=""
            [ -f "$f.sig" ] && sig=$(cat "$f.sig")
            url="https://github.com/${{ github.repository }}/releases/latest/download/$name"
            [ "$first" = true ] || echo -n "," >> release/latest.json
            first=false
            echo -n "\"$platform\":{\"url\":\"$url\",\"signature\":\"$sig\"}" >> release/latest.json
          done
          echo "}}" >> release/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          name: R-Markdown ${{ github.ref_name }}
          body: |
            ## 变更

            （请在此填写本次发布的变更说明）

            ## 下载

            | 平台 | 文件 |
            |------|------|
            | macOS | `.dmg` |
            | Windows | `.msi` |

            安装后应用会自动检测更新。
          draft: true
